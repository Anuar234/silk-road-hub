version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: silkroadhub
      POSTGRES_USER: srh
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_HOST_AUTH_METHOD: md5
      POSTGRES_INITDB_ARGS: "--auth-host=md5"
    # Bind DB only to loopback — never expose to the host network in prod.
    ports:
      - "127.0.0.1:5435:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U srh -d silkroadhub"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SRH_DB_URL: postgres://srh:${POSTGRES_PASSWORD}@postgres:5432/silkroadhub?sslmode=disable
      SRH_REDIS_URL: redis://redis:6379/0
      SRH_SESSION_SECRET: ${SRH_SESSION_SECRET:?SRH_SESSION_SECRET must be set in .env}
      SRH_CORS_ORIGIN: ${SRH_CORS_ORIGIN:-http://localhost:3000}
      SRH_SECURE_COOKIES: ${SRH_SECURE_COOKIES:-false}
      SRH_UPLOAD_DIR: /app/storage/uploads
      SRH_RUN_MIGRATIONS: "true"
    volumes:
      - upload_data:/app/storage/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      API_BACKEND_URL: http://backend:8080
      CSP_STRICT_ENABLED: ${CSP_STRICT_ENABLED:-false}
    depends_on:
      - backend
    restart: unless-stopped
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

volumes:
  pg_data:
  redis_data:
  upload_data:
