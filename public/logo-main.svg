  </text>
  <line x1="90" y1="166" x2="300" y2="166" stroke="url(#brandLine)" stroke-width="10" stroke-linecap="round" />
  <line x1="660" y1="166" x2="870" y2="166" stroke="url(#brandLine)" stroke-width="10" stroke-linecap="round" />
