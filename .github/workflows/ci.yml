name: silk-road-hub-ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: E2E tests
        run: npx playwright test

      - name: A11y smoke (pa11y)
        run: npx pa11y-ci http://127.0.0.1:3000/#/ || true

      - name: Lighthouse CI
        run: npx @lhci/cli autorun

  zap-baseline:
    runs-on: ubuntu-latest
    needs: build-test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: ZAP baseline scan
        run: |
          if [ -z "${{ secrets.STAGING_URL }}" ]; then
            echo "STAGING_URL secret is not configured; skipping ZAP."
            exit 0
          fi
          docker run --rm -t owasp/zap2docker-stable zap-baseline.py \
            -t "${{ secrets.STAGING_URL }}" \
            -r zap-report.html
